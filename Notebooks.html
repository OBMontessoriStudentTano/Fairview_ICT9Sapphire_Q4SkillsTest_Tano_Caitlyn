<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skill Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
        
    body{
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        flex-direction: column;
        background-image: url("https://images.squarespace-cdn.com/content/v1/664c7ae50eea9c731b37e817/3db1265c-67f7-49de-8d19-5845a499a064/Website+Detail+V2-01.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    #form-box{
        background: rgba(255, 255, 255, 0.20);
        backdrop-filter: blur(15px);
        padding: 35px;
        border-radius: 20px;
        width: 410px;
        box-shadow: 0 10px 35px rgba(0,0,0,0.5);
    }

    #form-box2{
        background: rgba(255, 255, 255, 0.20);
        backdrop-filter: blur(15px);
        padding: 35px;
        border-radius: 20px;
        width: 250px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        overflow: hidden;
        flex-direction: column;
    }

    h1 {
        text-align: center;
        font-size: 25px;
        font-weight: bold;
        color: black;
        margin-bottom: 20px;
    }

    h6 {
        text-align: center;
        font-size: 25px;
        font-weight: bold;
        color: black;
        margin-bottom: 20px;
    }

    .image {
        height: 90px;
    }

    .image img {
        height: 100%;
        width: 100%;
        object-fit: cover;
    }

    .information {
        padding: 25px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .btn-primary {
        transition: all 0.2s ease;
    }

    .btn-info:hover {
        background: rgba(250, 250, 250, 0.80);
        box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    #login.btn-info {
        background: linear-gradient(to right, #000000, #3432c7);
        border: none;
        color: white;
        transition: 0.2s ease;
        border: 2px solid black;
    }

    #login.btn-info:hover {
        background: linear-gradient(to right, #001f65, #6895fd);
        border: 2px solid white;
        box-shadow: 0 0 10px #aab4a9;
    }

    </style>
</head>


<body>

    <hl>Student Notebooks</hl>

    <h6>Pick a subject</h6>

<div id="form-box2">

    <div class="image">
        <img src="" alt="Header image">
    </div>

    <div class="information">
        <h5>Math</h5>
        <br>
        <h5>Sir Verba</h5>
    </div>

</div>
    
</body>
</html>
